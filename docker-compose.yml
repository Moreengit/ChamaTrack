version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: chamatrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123   # Change this to a stronger password later
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: